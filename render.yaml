services:
  - type: web
    name: medel-tracker
    runtime: node
    buildCommand: >
      npm install -g pnpm &&
      pnpm install &&
      pnpm --filter @workspace/samba2-tracker run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: >
      pnpm --filter @workspace/db run push &&
      node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false          # You will paste your Supabase URI here in Render dashboard
      - key: SESSION_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: APP_PASSWORD
        sync: false          # Set your team password in Render dashboard
